<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{display_name}} — 设计语言预览</title>
  <!-- design-language-id: {{id}} -->
  <style>
    /* 导入时：用该语言 prompt 中的 token 替换下列 CSS 变量与组件样式，结构区块勿删 */
    :root {
      --dl-bg: #f5f5f5;
      --dl-surface: #ffffff;
      --dl-on-surface: #1a1a1a;
      --dl-primary: #333333;
      --dl-on-primary: #ffffff;
      --dl-secondary: #e0e0e0;
      --dl-outline: #9e9e9e;
      --dl-radius-lg: 16px;
      --dl-radius-pill: 9999px;
      --dl-font: system-ui, sans-serif;
      --dl-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--dl-font);
      background: var(--dl-bg);
      color: var(--dl-on-surface);
      line-height: 1.5;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px 20px 48px; }
    .banner {
      background: var(--dl-surface);
      border-radius: var(--dl-radius-lg);
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: var(--dl-shadow);
    }
    .banner h1 { margin: 0 0 8px; font-size: 1.5rem; }
    .banner p { margin: 0; opacity: .75; font-size: .9rem; }
    section {
      background: var(--dl-surface);
      border-radius: var(--dl-radius-lg);
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: var(--dl-shadow);
    }
    section h2 { margin: 0 0 16px; font-size: 1.1rem; }
    .swatches { display: flex; flex-wrap: wrap; gap: 12px; }
    .swatch {
      width: 72px; text-align: center; font-size: .7rem;
    }
    .swatch div {
      height: 48px; border-radius: 12px; margin-bottom: 6px;
      border: 1px solid var(--dl-outline);
    }
    .type-samples h3 { margin: 12px 0 4px; }
    .type-samples p { margin: 0 0 8px; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 24px; border: none; cursor: pointer;
      border-radius: var(--dl-radius-pill);
      font-family: inherit; font-size: .875rem;
      transition: transform .2s, box-shadow .2s, background .2s;
    }
    .btn:active { transform: scale(.96); }
    .btn-primary { background: var(--dl-primary); color: var(--dl-on-primary); }
    .btn-tonal { background: var(--dl-secondary); color: var(--dl-on-surface); }
    .btn-outline {
      background: transparent; color: var(--dl-primary);
      border: 1px solid var(--dl-outline);
    }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .card {
      padding: 16px; border-radius: var(--dl-radius-lg);
      background: var(--dl-secondary);
    }
    .card h3 { margin: 0 0 8px; font-size: 1rem; }
    .card p { margin: 0; font-size: .875rem; opacity: .85; }
    .field {
      width: 100%; max-width: 360px; height: 56px; padding: 0 16px;
      border: none; border-bottom: 2px solid var(--dl-outline);
      border-radius: 12px 12px 0 0;
      background: var(--dl-secondary);
      font-family: inherit; font-size: 1rem;
    }
    .field:focus { outline: none; border-bottom-color: var(--dl-primary); }
    footer { text-align: center; font-size: .8rem; opacity: .6; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="banner">
      <h1>{{display_name}}</h1>
      <p>id: <code>{{id}}</code> · 与库内其它语言共用同一套预览结构，仅视觉 token 不同</p>
    </header>

    <section aria-labelledby="sec-colors">
      <h2 id="sec-colors">色彩</h2>
      <div class="swatches">
        <div class="swatch"><div style="background:var(--dl-bg)"></div>背景</div>
        <div class="swatch"><div style="background:var(--dl-surface)"></div>表面</div>
        <div class="swatch"><div style="background:var(--dl-primary)"></div>主色</div>
        <div class="swatch"><div style="background:var(--dl-secondary)"></div>次要</div>
      </div>
    </section>

    <section aria-labelledby="sec-type">
      <h2 id="sec-type">字体层级</h2>
      <div class="type-samples">
        <h3 style="font-size:2rem;font-weight:700;margin-top:0">标题 Large</h3>
        <p style="font-size:1.25rem">正文 Large — 用于导语</p>
        <p style="font-size:1rem">正文 Medium — 标准段落</p>
        <p style="font-size:.875rem;opacity:.8">Label — 辅助说明</p>
      </div>
    </section>

    <section aria-labelledby="sec-buttons">
      <h2 id="sec-buttons">按钮</h2>
      <div class="btn-row">
        <button type="button" class="btn btn-primary">主要操作</button>
        <button type="button" class="btn btn-tonal">次要操作</button>
        <button type="button" class="btn btn-outline">描边</button>
      </div>
    </section>

    <section aria-labelledby="sec-cards">
      <h2 id="sec-cards">卡片</h2>
      <div class="cards">
        <article class="card"><h3>功能 A</h3><p>简短说明文案。</p></article>
        <article class="card"><h3>功能 B</h3><p>简短说明文案。</p></article>
        <article class="card"><h3>功能 C</h3><p>简短说明文案。</p></article>
      </div>
    </section>

    <section aria-labelledby="sec-input">
      <h2 id="sec-input">输入框</h2>
      <input class="field" type="text" placeholder="示例输入" aria-label="示例输入" />
    </section>

    <footer>indexed 设计语言预览 · {{id}}</footer>
  </div>
</body>
</html>
