name: ix-init-cli
domain: 工作区初始化
one_liner: 初始化工作区（git 模式 + 昵称/称呼）+ 基线更新
status: implemented
intents:
  - "初始化 indexed、git init、配置 git 模式、本地/远程选择"
commands:
  - name: init
    inputs:
      - "--mode local|remote  # 跳过交互直接指定"
      - "--remote-url <url>   # remote 模式的远端"
      - "--nick <昵称>        # 助手昵称（默认 Xi酱）"
      - "--addr <称呼>        # 对用户称呼（默认 您）"
    outputs: "git init + 改写 git-workflow.md/CLAUDE.md 标记区 + .indexed-initialized"
    example: "python artifacts/ix-init-cli/main.py init --mode local --nick Xi酱"
  - name: update
    inputs:
      - "<source>  # 新基线解压后的目录路径"
    outputs: "覆盖框架文件 + 保护用户标记区 + 保留用户内容"
    example: "python artifacts/ix-init-cli/main.py update /path/to/indexed-0.2.0"
  - name: status
    inputs: []
    outputs: "版本 + git 模式 + 昵称/称呼 + 初始化状态（stdout）"
    example: "python artifacts/ix-init-cli/main.py status"
credentials: []
depends_on: []
notes: |
  通过 git-workflow.md 的 <!-- IX_GIT_MODE_BEGIN/END --> 标记区定位并改写，
  仅替换标记区内容，不动文件其余部分。支持重复运行切换模式。
