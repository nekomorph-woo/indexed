name: ix-workspace-index-cli
domain: 索引一致性审计
one_liner: 以 SPEC.yaml 为真相校验薄索引页与磁盘一致性
status: implemented
intents:
  - "索引审计、capabilities/registry 漂移检测"
  - "同步能力清单、能力发现"
commands:
  - name: audit
    inputs:
      - "--json  # 输出 JSON（供 Agent 消费）"
      - "--check  # 有 error 则退出码 1（CI 门禁）"
    outputs: "人类可读报告或 JSON（含 issues、agent_sync_hints）"
    example: "python main.py audit"
  - name: list
    inputs: []
    outputs: "已发现的 cli/agent 列表（stdout）"
    example: "python main.py list"
credentials: []
depends_on: []
notes: |
  真相源为各 cli/agent 的 SPEC.yaml；校验 capabilities.md/registry.md 薄索引是否覆盖且无孤儿。
  脚本只诊断，不改 Markdown；据 audit 输出由 Agent 更新索引页。
