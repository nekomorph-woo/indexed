name: ix-workspace-index-cli
domain: 索引一致性审计
one_liner: 以 SPEC.yaml 为真相校验一致性 + 同步用户索引
status: implemented
intents:
  - "索引审计、capabilities/registry 漂移检测"
  - "同步能力清单、能力发现"
commands:
  - name: audit
    inputs:
      - "--json  # 输出 JSON（供 Agent 消费）"
      - "--check  # 有 error 则退出码 1（CI 门禁）"
    outputs: "人类可读报告或 JSON（含 issues、agent_sync_hints）"
    example: "python main.py audit"
  - name: search
    inputs:
      - "<query>  # 意图关键词，如 '拉数' '定时' '审计'"
      - "--json   # 输出 JSON（供 AI 程序化消费）"
    outputs: "匹配的 cli/agent 列表（名称+一句话+意图+SPEC 路径），按分数排序"
    example: "python main.py search 审计"
  - name: list
    inputs: []
    outputs: "已发现的 cli/agent 列表（stdout）"
    example: "python main.py list"
  - name: sync
    inputs: []
    outputs: "把用户 SPEC.yaml 同步到薄索引 IX_USER_* 标记区"
    example: "python main.py sync"
credentials: []
depends_on: []
notes: |
  真相源为各 cli/agent 的 SPEC.yaml。audit 只诊断不写文件；sync 把用户 SPEC.yaml 同步到薄索引 IX_USER_* 标记区（会写）。
