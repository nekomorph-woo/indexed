name: ix-migration-draft-agent
domain: migration 草稿生成
one_liner: claude 自动生成 migration Python + 人话审核摘要（用户读 MD 决定是否发版）
status: implemented
intents:
  - "生成 migration、migration 草稿、breaking changes 分析、版本升级前准备"
params_required:
  - version
  - previous_version
params_optional:
  - migration_notes
  - regenerate_feedback
has_thinking: true
steps:
  - draft_migration
  - publish_review
schedule_safe: false
schedule_note: 必须人工审核（用户读 MIGRATION_REVIEW.md 后手动跑 ix-release-agent）；不允许定时
research: null
notes: |
  开发期 agent（不进分发产物）。
  thinking step 跑 claude -p，调 Read/Edit 工具直接编辑 migration Python 文件
  （claude --dangerously-skip-permissions 模式）。
  用户不需要懂 Python；只读 MIGRATION_REVIEW.md 决定是否发版。
  有问题用 regenerate_feedback 反馈，claude 重生成。
