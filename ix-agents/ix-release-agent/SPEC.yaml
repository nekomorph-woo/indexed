name: ix-release-agent
domain: 发版编排
one_liner: indexed 基线发版（bump + bundle + build + commit/tag + release；migration 由 ix-migration-draft-agent 提前生成）
status: implemented
intents:
  - "发版、release、打包发布、bump version、新版本"
params_required:
  - version
params_optional:
  - skip_bundle
  - skip_github_release
has_thinking: false
steps:
  - check_migration_review
  - bump_version
  - cli_bundle
  - app_build
  - git_commit_tag
  - github_release
schedule_safe: false
schedule_note: 发版必须人工监督；不允许定时触发
research: null
notes: |
  开发期 agent（不进分发产物）。
  M14.2 改造：移除 suggest_migration step（已由 ix-migration-draft-agent 完成）；
  移除 previous_version/migration_notes/skip_migration 参数；
  加 check_migration_review step（提示审核状态，不强制中止）。

  用户工作流：
    1. ix-migration-draft-agent 生成 migration + MIGRATION_REVIEW.md
    2. 用户读 MD 审核
    3. ix-release-agent 发版（本 agent）
