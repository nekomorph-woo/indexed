id: ix-release-agent
research: null

params:
  - name: version
    required: true
    prompt: 要发布的版本号（如 0.2.0）
  - name: skip_bundle
    required: false
    default: false
    prompt: 是否跳过 cli-bundle / app-bundle / tauri build
  - name: skip_github_release
    required: false
    default: false
    prompt: 是否跳过 GitHub Release

steps:
  # 1. tool：检查 MIGRATION_REVIEW.md 是否存在（提示审核状态，不强制）
  - id: check_migration_review
    type: tool
    description: 检查用户是否已审核 migration（MIGRATION_REVIEW.md 存在性）
    tool: shell
    command: >-
      test -f MIGRATION_REVIEW.md &&
      echo '[check] ✓ MIGRATION_REVIEW.md 存在（用户已审核 migration）' ||
      echo '[warn] MIGRATION_REVIEW.md 不存在；如本版本有 breaking changes，请先跑 ix-migration-draft-agent'

  # 2. tool：bump VERSION
  - id: bump_version
    type: tool
    description: 更新 VERSION 文件为新版本号
    tool: shell
    command: "echo '{params.version}' > VERSION && cat VERSION"

  # 3. tool：cli-bundle（skip_bundle=true 时跳过）
  - id: cli_bundle
    type: tool
    description: 生成 CLI-only tarball（indexed-cli-<version>.tar.gz）
    tool: shell
    command: >-
      [ "{params.skip_bundle}" = "true" ] && echo '[skip] cli-bundle' ||
      python3 artifacts/ix-bundle-cli/main.py cli-bundle

  # 4. tool：app-bundle + tauri build（skip_bundle=true 时跳过）
  - id: app_build
    type: tool
    description: 生成 .app baseline 目录 + 打包 macOS .dmg
    tool: shell
    command: >-
      [ "{params.skip_bundle}" = "true" ] && echo '[skip] app-bundle + tauri build' ||
      (python3 artifacts/ix-bundle-cli/main.py app-bundle &&
       cd ix-gui && ./web/node_modules/.bin/tauri build)

  # 5. tool：git commit + tag
  - id: git_commit_tag
    type: tool
    description: git commit + tag v<version>
    tool: shell
    command: "bash ix-agents/ix-release-agent/scripts/git-commit-tag.sh {params.version}"

  # 6. tool：github release（skip_github_release=true 时跳过）
  - id: github_release
    type: tool
    description: 创建 GitHub Release（上传 tar.gz + .dmg + changelog）
    tool: shell
    command: >-
      [ "{params.skip_github_release}" = "true" ] && echo '[skip] github release' ||
      bash ix-agents/ix-release-agent/scripts/github-release.sh {params.version}
